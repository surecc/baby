name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: node --check server.js db.js

      - name: DB init check
        run: node -e "process.env.DB_PATH='/tmp/test.db'; require('./db'); console.log('✓ DB init OK')"
