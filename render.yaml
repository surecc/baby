services:
  - type: web
    name: baby-tracker
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 3000
      - key: DB_PATH
        value: /data/baby.db
      - key: NODE_ENV
        value: production
